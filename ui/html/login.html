<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CDP – Login</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="login-page">

  <div class="login-box">
    <h1>Course Discussion Platform</h1>
    <p>Virginia Tech — sign in with your VT credentials</p>

    <label for="loginEmail">VT Email</label>
    <input type="email" id="loginEmail" placeholder="pid@vt.edu">

    <label for="loginPass">Password</label>
    <input type="password" id="loginPass" placeholder="••••••••">

    <label for="loginRole">I am a...</label>
    <select id="loginRole">
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
      <option value="sysadmin">System Administrator</option>
    </select>

    <button onclick="doLogin()">Sign In</button>
    <div class="err" id="loginErr">Incorrect email or password.</div>
  </div>

  <script>
    document.getElementById('loginPass').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPass').value;
      const role     = document.getElementById('loginRole').value;

      // POST to your Express backend — backend does:
      //   SELECT * FROM User WHERE email = ?
      //   bcrypt.compare(password, user.passwordHash)
      //   if match: res.json({ name, role }) and set session cookie
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role })
      });

      if (res.ok) {
        document.getElementById('loginErr').style.display = 'none';
        window.location.href = 'home.html';
      } else {
        document.getElementById('loginErr').style.display = 'block';
      }
    }
  </script>

</body>
</html>
