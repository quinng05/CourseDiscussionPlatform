<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CDP – Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="home-page">

  <nav>
    <strong>Course Discussion Platform</strong>
    <span id="navUser"></span>
    <button onclick="signOut()">Sign out</button>
  </nav>

  <div class="home-body">
    <h1>Find a course forum</h1>

    <div class="search-row">
      <select id="searchType" onchange="filterCards()">
        <option value="title">Title</option>
        <option value="code">Code</option>
        <option value="instructor">Instructor</option>
      </select>
      <input type="text" id="searchInput" placeholder="Search..." oninput="filterCards()">
    </div>

    <!-- Only rendered for sysadmin users (P3) -->
    <div id="adminCreate" style="display:none">
      <button onclick="openModal()">+ Create New Forum</button>
    </div>

    <div id="resultCount"></div>
    <div id="cardList"></div>
    <div id="noResults">No forums match your search.</div>
  </div>

  <!-- Sysadmin create-forum modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Create New Forum</h2>
      <label>Course Code</label>
      <input type="text" id="newCode" placeholder="e.g. CS4604">
      <label>Course Title</label>
      <input type="text" id="newTitle" placeholder="e.g. Intro to Database Mgmt">
      <label>Instructor Name</label>
      <input type="text" id="newInstructor" placeholder="e.g. Dr. Nizamani">
      <div class="modal-btns">
        <button onclick="closeModal()">Cancel</button>
        <button onclick="createForum()">Create</button>
      </div>
    </div>
  </div>

  <script>
    // TODO: replace with GET /api/session to get the logged-in user from your backend session
    // const res  = await fetch('/api/session');
    // const user = await res.json(); // { name, role }
    // if (!user) window.location.href = 'login.html';
    // document.getElementById('navUser').textContent = user.name + ' (' + user.role + ')';
    // if (user.role === 'sysadmin') document.getElementById('adminCreate').style.display = 'block';

    // TODO: replace with GET /api/forums to load forums from your DB
    // Returns rows from: SELECT ci.courseInstructorId, c.courseCode, c.title,
    //                           u.name AS instructor, AVG(r.score) AS avgRating, COUNT(r.ratingId) AS ratingCount
    //                    FROM CourseInstructor ci
    //                    JOIN Course c ON ci.courseCode = c.courseCode
    //                    JOIN Teacher t ON ci.teacherId = t.userId
    //                    JOIN User u ON t.userId = u.userId
    //                    LEFT JOIN Rating r ON ci.courseInstructorId = r.courseInstructorId
    //                    GROUP BY ci.courseInstructorId
    let FORUMS = [
      { id:1, code:"CS4604",   title:"Intro to Database Mgmt Systems", instructor:"Dr. Nizamani", avgRating:4.6, ratingCount:18 },
      { id:2, code:"CS3214",   title:"Computer Systems",               instructor:"Dr. Luther",   avgRating:3.8, ratingCount:31 },
      { id:3, code:"CS4234",   title:"Analysis of Algorithms",         instructor:"Dr. Heath",    avgRating:4.1, ratingCount:22 },
      { id:4, code:"CS3744",   title:"Introduction to GUI",            instructor:"Dr. Shaffer",  avgRating:4.4, ratingCount:14 },
      { id:5, code:"MATH2114", title:"Linear Algebra",                 instructor:"Dr. Thomson",  avgRating:3.5, ratingCount:40 },
      { id:6, code:"CS4654",   title:"Intro to Machine Learning",      instructor:"Dr. Zhang",    avgRating:4.7, ratingCount:9  },
    ];

    function filterCards() {
      const type = document.getElementById('searchType').value;
      const q    = document.getElementById('searchInput').value.toLowerCase();
      const list = FORUMS.filter(f => {
        if (type === 'code')       return f.code.toLowerCase().includes(q);
        if (type === 'instructor') return f.instructor.toLowerCase().includes(q);
        return f.title.toLowerCase().includes(q);
      });
      renderCards(list);
    }

    function renderCards(list) {
      const el = document.getElementById('cardList');
      el.innerHTML = '';
      document.getElementById('resultCount').textContent = 'Showing ' + list.length + ' forum(s)';
      document.getElementById('noResults').style.display = list.length === 0 ? 'block' : 'none';
      list.forEach(f => {
        const d = document.createElement('div');
        d.className = 'card';
        d.innerHTML =
          '<div>' +
            '<div class="card-title">' + f.title + ' (' + f.code + ')</div>' +
            '<div class="card-sub">with ' + f.instructor + ' &mdash; ' + f.ratingCount + ' ratings</div>' +
          '</div>' +
          '<div class="card-rating">' + f.avgRating.toFixed(1) + ' / 5</div>';
        d.addEventListener('click', () => {
          // Pass the selected forum to the forum page via sessionStorage
          sessionStorage.setItem('cdp_forum', JSON.stringify(f));
          window.location.href = 'forum.html';
        });
        el.appendChild(d);
      });
    }

    function openModal()  { document.getElementById('modalOverlay').classList.add('open'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    function createForum() {
      const code       = document.getElementById('newCode').value.trim();
      const title      = document.getElementById('newTitle').value.trim();
      const instructor = document.getElementById('newInstructor').value.trim();
      if (!code || !title || !instructor) { alert('All fields required.'); return; }

      // TODO: replace with POST /api/forums — inserts into CourseInstructor in your DB
      FORUMS.unshift({ id: Date.now(), code, title, instructor, avgRating: 0, ratingCount: 0 });
      closeModal();
      filterCards();
    }

    function signOut() {
      // TODO: POST /api/logout to clear your backend session, then redirect
      window.location.href = 'login.html';
    }

    // Initial render
    renderCards(FORUMS);
  </script>

</body>
</html>
