<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CDP – Forum</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="forum-page">

  <nav>
    <button class="back-btn" onclick="window.location.href='home.html'">&larr; Back to search</button>
    <span id="navUser"></span>
    <button onclick="signOut()">Sign out</button>
  </nav>

  <div id="forumHeader">
    <h2 id="forumTitle">—</h2>
    <div class="sub" id="forumInstructor">—</div>
    <div class="avg">
      Average rating: <strong id="forumAvg">—</strong>
      <span id="forumCount" style="color:#777;"></span>
    </div>
  </div>

  <div id="postsArea">
    <div id="postList"></div>
  </div>

  <!-- Only shown to students -->
  <div id="submitPanel" style="display:none">
    <h3>Leave a rating or review</h3>
    <div class="submit-score-row">
      <label>Score (1–10):</label>
      <!--
        1-10 maps to half-stars out of 5: score 2 = 1★, score 5 = 2½★, score 10 = 5★
        TODO: swap this <select> for a graphical half-star click picker if desired
      -->
      <select id="scoreSelect">
        <option value="">-- select --</option>
        <option value="1">1  (½★)</option>
        <option value="2">2  (1★)</option>
        <option value="3">3  (1½★)</option>
        <option value="4">4  (2★)</option>
        <option value="5">5  (2½★)</option>
        <option value="6">6  (3★)</option>
        <option value="7">7  (3½★)</option>
        <option value="8">8  (4★)</option>
        <option value="9">9  (4½★)</option>
        <option value="10">10 (5★)</option>
      </select>
    </div>

    <!--
      Leaving textarea blank = score-only submission (Rating row only, no DiscussionPost)
      Filling textarea = Rating row + DiscussionPost row with ratingId FK pointing back to it
    -->
    <textarea id="reviewText" placeholder="Optional: write a review (leave blank to submit score only)"></textarea>

    <div class="submit-options">
      <label>Semester:
        <select id="semesterSelect">
          <option value="1">Spring 2026</option>
          <option value="2">Fall 2025</option>
          <option value="3">Spring 2025</option>
          <option value="4">Fall 2024</option>
        </select>
      </label>
      <label><input type="checkbox" id="anonCheck"> Anonymous</label>
      <button onclick="submitRating()">Submit</button>
    </div>
  </div>

  <script>
    // Load forum from sessionStorage (set by home.html on card click)
    const forum = JSON.parse(sessionStorage.getItem('cdp_forum') || 'null');
    if (!forum) window.location.href = 'home.html';

    // TODO: replace with GET /api/session
    // const user = await (await fetch('/api/session')).json();
    // if (!user) window.location.href = 'login.html';
    // document.getElementById('navUser').textContent = user.name + ' (' + user.role + ')';
    // if (user.role === 'student') document.getElementById('submitPanel').style.display = 'block';

    // Populate header from forum object
    document.getElementById('forumTitle').textContent      = forum.title + ' (' + forum.code + ')';
    document.getElementById('forumInstructor').textContent = 'with ' + forum.instructor;
    document.getElementById('forumAvg').textContent        = forum.avgRating.toFixed(1) + ' / 5';
    document.getElementById('forumCount').textContent      = ' (' + forum.ratingCount + ' ratings)';

    // TODO: replace with GET /api/forums/:id/posts
    // Returns rows from: SELECT dp.*, u.name AS authorName, s.term, s.year, r.score
    //                    FROM DiscussionPost dp
    //                    JOIN User u ON dp.authorId = u.userId
    //                    LEFT JOIN Semester s ON dp.semesterId = s.semesterId
    //                    LEFT JOIN Rating r ON dp.ratingId = r.ratingId
    //                    WHERE dp.courseInstructorId = ? AND dp.parentPostId IS NULL
    let activePosts = [
      {
        postId:1, parentPostId:null, ratingId:101,
        authorName:"Alex M.", anonymous:false,
        semester:"Fall 2024", score:9,
        text:"One of the best CS courses at VT. Projects are well-designed and practical.",
        createdAt:"2024-12-10",
        replies:[
          { postId:4, parentPostId:1, ratingId:null, authorName:"Dr. Nizamani", anonymous:false, semester:null, score:null, text:"Thank you for the kind words!", createdAt:"2024-12-11", replies:[] },
          { postId:5, parentPostId:1, ratingId:null, authorName:"Sam K.", anonymous:false, semester:null, score:null, text:"Agreed — the ERD project especially.", createdAt:"2024-12-12", replies:[] },
        ]
      },
      {
        postId:2, parentPostId:null, ratingId:102,
        authorName:"Anonymous", anonymous:true,
        semester:"Spring 2025", score:7,
        text:"Good course. Lectures dense but important. Start projects early.",
        createdAt:"2025-05-02", replies:[]
      },
      {
        postId:3, parentPostId:null, ratingId:103,
        authorName:"Jordan T.", anonymous:false,
        semester:"Fall 2024", score:6,
        text:"Content is interesting but workload heavier than expected.",
        createdAt:"2024-12-15",
        replies:[
          { postId:6, parentPostId:3, ratingId:null, authorName:"Anonymous", anonymous:true, semester:null, score:null, text:"The normalization section was tough.", createdAt:"2024-12-16", replies:[] },
        ]
      },
    ];

    // ── Helpers ────────────────────────────────────────────────────────────
    function scoreLabel(score) {
      if (score === null) return '';
      const half = score / 2;
      const full = Math.floor(half);
      const hasH = half % 1 >= 0.5;
      return '★'.repeat(full) + (hasH ? '½' : '') + ' (' + score + '/10)';
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ── Build a post element (recursive — used for replies too) ────────────
    function buildPostEl(p) {
      const div = document.createElement('div');
      div.className = 'post';
      div.dataset.postId = p.postId;

      const author  = p.anonymous ? 'Anonymous' : esc(p.authorName);
      const semPart = p.semester ? ' &bull; ' + p.semester : '';
      const score   = p.score !== null
        ? '<div class="post-score">' + scoreLabel(p.score) + '</div>'
        : '';
      const text    = p.text
        ? '<div class="post-text">' + esc(p.text) + '</div>'
        : '';
      const repliesToggle = p.replies && p.replies.length
        ? '<button class="replies-toggle" onclick="toggleReplies(this)">' +
            p.replies.length + ' repl' + (p.replies.length === 1 ? 'y' : 'ies') + ' &#9660;' +
          '</button>'
        : '';

      div.innerHTML =
        '<div class="post-meta"><strong>' + author + '</strong>' + semPart + ' &bull; ' + p.createdAt + '</div>' +
        score + text +
        '<button class="reply-btn" onclick="showReplyForm(this,' + p.postId + ')">Reply</button>' +
        repliesToggle +
        (p.replies && p.replies.length ? '<div class="replies-list"></div>' : '') +
        '<div class="inline-reply-form">' +
          '<textarea placeholder="Write a reply..."></textarea>' +
          '<div class="form-btns">' +
            '<button onclick="submitReply(this,' + p.postId + ')">Post reply</button>' +
            '<button onclick="cancelReply(this)">Cancel</button>' +
          '</div>' +
        '</div>';

      if (p.replies && p.replies.length) {
        const repliesContainer = div.querySelector('.replies-list');
        p.replies.forEach(r => repliesContainer.appendChild(buildPostEl(r)));
      }

      return div;
    }

    function renderPosts() {
      const list = document.getElementById('postList');
      list.innerHTML = '';
      activePosts.forEach(p => list.appendChild(buildPostEl(p)));
    }

    // ── Replies accordion ──────────────────────────────────────────────────
    function toggleReplies(btn) {
      const repliesList = btn.nextElementSibling;
      repliesList.classList.toggle('open');
      const n = repliesList.querySelectorAll(':scope > .post').length;
      btn.textContent = repliesList.classList.contains('open')
        ? n + ' repl' + (n === 1 ? 'y' : 'ies') + ' ▲'
        : n + ' repl' + (n === 1 ? 'y' : 'ies') + ' ▼';
    }

    // ── Inline reply form ──────────────────────────────────────────────────
    function showReplyForm(btn, postId) {
      document.querySelectorAll('.inline-reply-form').forEach(f => f.style.display = 'none');
      const form = btn.parentElement.querySelector('.inline-reply-form');
      form.style.display = 'block';
      form.querySelector('textarea').focus();
    }

    function cancelReply(btn) {
      btn.closest('.inline-reply-form').style.display = 'none';
    }

    function submitReply(btn, parentPostId) {
      const form = btn.closest('.inline-reply-form');
      const text = form.querySelector('textarea').value.trim();
      if (!text) { alert('Reply cannot be empty.'); return; }

      // TODO: replace with POST /api/posts
      // Body: { courseInstructorId: forum.id, parentPostId, semesterId: null, authorId: user.userId, ratingId: null, postText: text }
      const newReply = {
        postId: Date.now(), parentPostId,
        ratingId: null, authorName: 'You', anonymous: false,
        semester: null, score: null, text,
        createdAt: new Date().toISOString().slice(0, 10), replies: []
      };

      function insert(posts) {
        for (let p of posts) {
          if (p.postId === parentPostId) { p.replies.push(newReply); return true; }
          if (p.replies && insert(p.replies)) return true;
        }
        return false;
      }
      insert(activePosts);

      form.querySelector('textarea').value = '';
      form.style.display = 'none';
      renderPosts();
    }

    // ── Submit rating (+ optional review post) ─────────────────────────────
    function submitRating() {
      const score = document.getElementById('scoreSelect').value;
      const text  = document.getElementById('reviewText').value.trim();
      const anon  = document.getElementById('anonCheck').checked;
      const semEl = document.getElementById('semesterSelect');
      const sem   = semEl.options[semEl.selectedIndex].text;

      if (!score) { alert('Please select a score.'); return; }

      // TODO: replace with two backend calls:
      //   1. POST /api/ratings  → INSERT INTO Rating (score, studentId, courseInstructorId, semesterId)
      //   2. If text provided:
      //      POST /api/posts    → INSERT INTO DiscussionPost (postText, courseInstructorId, semesterId, authorId, ratingId)
      //                           where ratingId = the ID returned from step 1
      activePosts.unshift({
        postId: Date.now(), parentPostId: null, ratingId: Date.now() + 1,
        authorName: anon ? 'Anonymous' : 'You',
        anonymous: anon, semester: sem,
        score: parseInt(score), text,
        createdAt: new Date().toISOString().slice(0, 10), replies: []
      });

      document.getElementById('scoreSelect').value = '';
      document.getElementById('reviewText').value  = '';
      document.getElementById('anonCheck').checked = false;
      renderPosts();
    }

    function signOut() {
      // TODO: POST /api/logout
      window.location.href = 'login.html';
    }

    renderPosts();
  </script>

</body>
</html>
